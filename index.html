<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>WorldFirst · Asset Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root{
    --pink:#E6185F;
    --pink-2:#FF4F8A;
    --ink:#0B0D12;
    --ink-2:#12151C;
    --ink-3:#1A1E28;
    --ink-4:#242936;
    --line:#2A2F3F;
    --line-2:#3A4053;
    --mute:#7A8099;
    --text:#E7EAF2;
    --text-dim:#AEB4C7;
    --good:#22C55E;
    --warn:#F59E0B;
    --bad:#EF4444;
    --blue:#3B82F6;
    --purple:#A855F7;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--ink);color:var(--text);font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{min-height:100vh;display:flex;flex-direction:column}
  a{color:inherit;text-decoration:none}
  button,select,input{font-family:inherit}
  button{cursor:pointer}

  /* HEADER */
  header{border-bottom:1px solid var(--line);background:var(--ink);position:sticky;top:0;z-index:100}
  .hdr-inner{padding:18px 28px;max-width:1600px;margin:0 auto}
  .hdr-top{display:flex;align-items:center;justify-content:space-between;gap:24px;margin-bottom:14px}
  .brand{display:flex;align-items:center;gap:12px}
  .brand-mark{width:32px;height:32px;border-radius:7px;background:var(--pink);display:flex;align-items:center;justify-content:center;font-weight:800;color:white;font-size:13px;letter-spacing:-0.5px}
  .brand-text .t1{font-weight:700;font-size:14px}
  .brand-text .t2{font-size:10.5px;color:var(--mute);letter-spacing:0.6px;text-transform:uppercase;margin-top:1px}
  .hdr-meta{display:flex;gap:12px;align-items:center;color:var(--mute);font-size:11.5px}
  .hdr-meta .pill{background:var(--ink-2);padding:4px 9px;border-radius:20px;font-family:JetBrains Mono,monospace;font-size:10.5px}

  .region-bar{display:flex;gap:6px;overflow-x:auto;padding:4px 0 8px;scrollbar-width:thin}
  .region-bar::-webkit-scrollbar{height:4px}
  .region-bar::-webkit-scrollbar-thumb{background:var(--line)}
  .region-pill{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;background:var(--ink-2);border:1px solid var(--line);color:var(--text-dim);white-space:nowrap;transition:all .12s;display:flex;align-items:center;gap:8px;flex-shrink:0}
  .region-pill:hover{color:var(--text);border-color:var(--line-2)}
  .region-pill.active{background:var(--pink);border-color:var(--pink);color:white}
  .region-pill .rc{font-family:JetBrains Mono,monospace;font-size:10.5px;background:rgba(255,255,255,0.12);padding:1px 6px;border-radius:4px;color:inherit}
  .region-pill.active .rc{background:rgba(0,0,0,0.2)}
  .region-pill .gap-dot{width:6px;height:6px;background:var(--bad);border-radius:50%}

  .campaign-bar{display:flex;gap:6px;overflow-x:auto;padding:10px 0 0;border-top:1px solid var(--line);margin-top:2px}
  .campaign-bar::-webkit-scrollbar{height:3px}
  .campaign-pill{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;background:transparent;border:1px solid var(--line);color:var(--text-dim);white-space:nowrap;flex-shrink:0}
  .campaign-pill:hover{color:var(--text)}
  .campaign-pill.active{background:var(--ink-3);border-color:var(--pink);color:var(--pink)}
  .campaign-pill .cc{font-family:JetBrains Mono,monospace;font-size:10px;color:var(--mute);margin-left:4px}

  /* LAYOUT */
  main{display:grid;grid-template-columns:240px 1fr;gap:0;max-width:1600px;margin:0 auto;width:100%;flex:1}
  aside{border-right:1px solid var(--line);padding:20px 18px;position:sticky;top:212px;height:calc(100vh - 212px);overflow-y:auto}
  .facet{margin-bottom:20px}
  .facet h3{font-size:10.5px;text-transform:uppercase;letter-spacing:0.8px;color:var(--mute);margin:0 0 8px;font-weight:700}
  .facet .chips{display:flex;flex-direction:column;gap:3px}
  .chip{background:transparent;border:1px solid transparent;color:var(--text-dim);padding:6px 9px;border-radius:6px;font-size:12.5px;text-align:left;display:flex;justify-content:space-between;align-items:center}
  .chip:hover{background:var(--ink-2);color:var(--text)}
  .chip.active{background:var(--ink-3);border-color:var(--line-2);color:var(--text);font-weight:600}
  .chip .c{font-family:JetBrains Mono,monospace;font-size:10px;color:var(--mute)}
  .chip.active .c{color:var(--pink)}

  /* GRID */
  .grid-wrap{padding:22px 28px;overflow-y:auto}
  .breadcrumb{display:flex;align-items:center;gap:10px;margin-bottom:14px;font-size:13px;color:var(--mute)}
  .breadcrumb strong{color:var(--text);font-weight:600}
  .breadcrumb .sep{color:var(--line-2)}
  .bc-count{margin-left:auto;color:var(--mute);font-size:12px;font-family:JetBrains Mono,monospace}

  .toolbar{display:flex;gap:8px;margin-bottom:18px;align-items:center}
  .search{flex:1;background:var(--ink-2);border:1px solid var(--line);border-radius:8px;padding:0 12px;display:flex;align-items:center;gap:8px}
  .search svg{color:var(--mute);flex-shrink:0}
  .search input{flex:1;background:transparent;border:0;outline:0;color:var(--text);font-size:13.5px;padding:9px 0}
  .search input::placeholder{color:var(--mute)}
  .sort{background:var(--ink-2);border:1px solid var(--line);border-radius:8px;padding:0 10px 0 14px;color:var(--text);font-size:13px;height:38px;outline:0}
  .sort option{background:var(--ink-2)}
  .clear{background:transparent;border:1px solid var(--line);color:var(--mute);padding:0 12px;border-radius:8px;height:38px;font-size:12px}
  .clear:hover{border-color:var(--line-2);color:var(--text)}

  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}

  /* CARD */
  .card{background:var(--ink-2);border:1px solid var(--line);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;transition:all .12s;cursor:pointer}
  .card:hover{border-color:var(--pink);transform:translateY(-2px)}
  .card.gap{border:1.5px dashed rgba(239,68,68,0.4);background:rgba(239,68,68,0.03)}
  .card.gap:hover{border-color:var(--bad)}

  /* Vertical 9:16 thumbnail — designed as a video poster */
  .thumb{aspect-ratio:9/16;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--ink-3)}
  .thumb-bg-pattern{
    position:absolute;inset:0;
    background-image:
      radial-gradient(circle at 30% 20%, rgba(255,255,255,0.08) 0%, transparent 40%),
      radial-gradient(circle at 70% 80%, rgba(255,255,255,0.05) 0%, transparent 50%);
  }
  .thumb-corner-mark{position:absolute;bottom:54px;left:14px;right:14px;display:flex;align-items:center;gap:6px}
  .thumb-corner-mark .wf-mini{width:18px;height:18px;background:var(--pink);border-radius:4px;display:flex;align-items:center;justify-content:center;color:white;font-weight:800;font-size:8.5px;letter-spacing:-0.3px}
  .thumb-corner-mark .ch{font-size:9.5px;color:rgba(255,255,255,0.65);letter-spacing:0.4px;text-transform:uppercase;font-weight:600}

  .thumb-title-block{position:absolute;left:14px;right:14px;top:50%;transform:translateY(-55%);text-align:left}
  .thumb-title{
    font-family:Fraunces,Georgia,serif;font-weight:600;
    font-size:17px;line-height:1.15;color:white;letter-spacing:-0.5px;
    text-shadow:0 1px 3px rgba(0,0,0,0.4);
    display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;
  }
  .thumb-creator-line{
    position:absolute;bottom:14px;left:14px;right:14px;
    font-size:11px;color:rgba(255,255,255,0.85);font-weight:500;
    display:flex;align-items:center;gap:6px;
  }
  .thumb-creator-line .dot{width:3px;height:3px;background:rgba(255,255,255,0.5);border-radius:50%}

  .thumb-badges{position:absolute;top:10px;left:10px;right:10px;display:flex;gap:6px;flex-wrap:wrap;justify-content:space-between}
  .badge{background:rgba(0,0,0,0.65);backdrop-filter:blur(8px);color:white;padding:3px 8px;border-radius:5px;font-size:9.5px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;display:flex;align-items:center;gap:4px}
  .badge.live{background:var(--good);color:#0A1F0F}
  .badge.edit{background:var(--warn);color:#1F1407}
  .badge.ready{background:var(--blue);color:#0A1F2E}
  .badge.gap{background:var(--bad);color:#1F0707}
  .badge.winding{background:#F97316;color:#1F0E07}
  .badge-dur{position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.72);color:white;padding:3px 7px;border-radius:4px;font-size:10.5px;font-family:JetBrains Mono,monospace;font-weight:600}

  .thumb-play{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.18);
    backdrop-filter:blur(8px);border:1.5px solid rgba(255,255,255,0.4);
    display:flex;align-items:center;justify-content:center;
    opacity:0;transition:opacity .15s;
  }
  .card:hover .thumb-play{opacity:1}
  .thumb-play::after{content:"";border-left:14px solid white;border-top:9px solid transparent;border-bottom:9px solid transparent;margin-left:4px}

  /* live thumbnail variant — fake screenshot feel */
  .thumb.is-live::before{
    content:"";position:absolute;inset:0;
    background:radial-gradient(ellipse at 50% 30%, rgba(255,255,255,0.12), transparent 60%);
    z-index:1;
  }
  .thumb-views-live{
    position:absolute;bottom:14px;right:14px;
    background:rgba(0,0,0,0.55);backdrop-filter:blur(6px);
    padding:3px 7px;border-radius:4px;font-size:10px;font-weight:700;color:white;
    font-variant-numeric:tabular-nums;display:flex;align-items:center;gap:3px;
  }
  .thumb-views-live::before{content:"";width:5px;height:5px;background:var(--good);border-radius:50%;box-shadow:0 0 6px var(--good)}

  /* Card body */
  .body{padding:11px 13px 13px;display:flex;flex-direction:column;gap:7px;flex:1}
  .meta-row{font-size:11px;color:var(--mute);display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .meta-row .tag{padding:2px 6px;border-radius:3px;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:0.4px}
  .tag.kol{background:rgba(168,85,247,0.15);color:#C084FC}
  .tag.team{background:rgba(59,130,246,0.15);color:#60A5FA}
  .tag.freelancer{background:rgba(245,158,11,0.15);color:#FCD34D}
  .tag.partner{background:rgba(34,197,94,0.15);color:#4ADE80}
  .tag.buyer{background:rgba(236,72,153,0.15);color:#F472B6}

  .creator{font-weight:500;color:var(--text-dim);font-size:11px}
  .campaign-ref{font-size:10px;color:var(--pink);font-weight:600;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:0}

  /* Channels (no X) */
  .channels{display:flex;gap:4px;margin-top:4px;padding-top:7px;border-top:1px solid var(--line)}
  .ch-link{width:22px;height:22px;border-radius:4px;background:var(--ink-3);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--text-dim);transition:all .12s}
  .ch-link.has{background:var(--ink-4);color:var(--text)}
  .ch-link.has:hover{background:var(--pink);color:white}

  /* Quick perf row on card (only top-line) */
  .perf-quick{
    display:flex;gap:8px;font-size:11px;color:var(--text-dim);margin-top:2px;
    padding:6px 8px;background:var(--ink);border-radius:5px;
    align-items:center;
  }
  .perf-quick strong{color:var(--text);font-variant-numeric:tabular-nums;font-weight:700}
  .perf-quick .sep{opacity:0.4}
  .perf-pending{padding:6px 8px;background:var(--ink-3);border-radius:5px;font-size:10.5px;color:var(--mute);font-style:italic;display:flex;align-items:center;gap:6px}
  .perf-pending::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--mute);opacity:0.5}

  /* Source links — Finished | Original | Script */
  .source-row{display:flex;gap:8px;font-size:10.5px;color:var(--mute);margin-top:auto;padding-top:7px;border-top:1px solid var(--line)}
  .source-link{color:var(--text-dim);border-bottom:1px dotted var(--line-2);padding-bottom:1px}
  .source-link:hover{color:var(--pink);border-color:var(--pink)}
  .source-missing{color:var(--mute);opacity:0.5}

  /* MODAL */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);
    z-index:1000;display:none;align-items:center;justify-content:center;padding:30px;
  }
  .modal-overlay.open{display:flex}
  .modal{
    background:var(--ink-2);border:1px solid var(--line);border-radius:14px;
    width:100%;max-width:1100px;max-height:calc(100vh - 60px);overflow-y:auto;
    position:relative;
  }
  .modal-close{
    position:sticky;top:14px;float:right;margin:14px 14px 0 0;
    width:34px;height:34px;border-radius:50%;background:var(--ink-3);
    border:1px solid var(--line);color:var(--text);font-size:18px;
    display:flex;align-items:center;justify-content:center;z-index:5;
  }
  .modal-close:hover{background:var(--pink);border-color:var(--pink);color:white}

  .modal-hero{
    display:grid;grid-template-columns:240px 1fr;gap:24px;padding:24px;
    border-bottom:1px solid var(--line);
  }
  .modal-poster{
    aspect-ratio:9/16;border-radius:10px;overflow:hidden;position:relative;
    background:var(--ink-3);display:flex;align-items:center;justify-content:center;
  }
  .modal-info{display:flex;flex-direction:column;gap:10px;min-width:0}
  .modal-info .id-pill{font-family:JetBrains Mono,monospace;font-size:10.5px;color:var(--mute);background:var(--ink-3);padding:3px 8px;border-radius:4px;align-self:flex-start}
  .modal-info h2{
    font-family:Fraunces,Georgia,serif;font-weight:600;font-size:26px;
    line-height:1.15;color:var(--text);letter-spacing:-0.7px;margin:4px 0 6px;
  }
  .modal-info .modal-camp{font-size:11px;color:var(--pink);font-weight:700;letter-spacing:0.6px;text-transform:uppercase}
  .modal-meta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:10px}
  .modal-meta-grid .mm{background:var(--ink);padding:9px 11px;border-radius:6px}
  .modal-meta-grid .mm .l{font-size:9.5px;color:var(--mute);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px}
  .modal-meta-grid .mm .v{font-size:13px;color:var(--text);font-weight:600}

  .lifecycle-status{
    background:var(--ink);border:1px solid var(--line);border-radius:8px;
    padding:14px 16px;align-self:flex-start;width:100%;margin-top:6px;
    display:flex;flex-direction:column;gap:4px;
  }
  .lifecycle-status.active{border-color:var(--good)}
  .lifecycle-status.cooling{border-color:var(--warn)}
  .lifecycle-status.below{border-color:var(--bad)}
  .lifecycle-status .lc-head{display:flex;justify-content:space-between;align-items:baseline}
  .lifecycle-status .lc-stage{font-weight:700;font-size:13px;display:flex;align-items:center;gap:6px}
  .lifecycle-status .lc-stage .icon{font-size:14px}
  .lifecycle-status .lc-action{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;padding:3px 8px;border-radius:4px}
  .lifecycle-status.active .lc-action{background:rgba(34,197,94,0.15);color:var(--good)}
  .lifecycle-status.cooling .lc-action{background:rgba(245,158,11,0.15);color:var(--warn)}
  .lifecycle-status.below .lc-action{background:rgba(239,68,68,0.15);color:var(--bad)}
  .lifecycle-status .lc-detail{font-size:11px;color:var(--text-dim);line-height:1.4}

  /* Modal performance section */
  .modal-perf{padding:24px;border-bottom:1px solid var(--line)}
  .modal-perf h3{margin:0 0 16px;font-size:14px;font-weight:700;color:var(--text);display:flex;justify-content:space-between;align-items:baseline}
  .modal-perf h3 .updated{font-size:10.5px;color:var(--mute);font-weight:500;font-family:JetBrains Mono,monospace}

  .chart-wrap{position:relative;height:280px;margin-bottom:18px}

  .metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px}
  .mtile{background:var(--ink);border:1px solid var(--line);border-radius:8px;padding:14px}
  .mtile .l{font-size:10px;color:var(--mute);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;font-weight:700}
  .mtile .vrow{display:flex;align-items:baseline;gap:8px}
  .mtile .v{font-size:24px;font-weight:800;color:var(--text);font-variant-numeric:tabular-nums;letter-spacing:-0.5px}
  .mtile .vsub{font-size:11px;color:var(--mute)}
  .mtile .compare{margin-top:8px;display:flex;flex-direction:column;gap:3px;font-size:10.5px}
  .mtile .compare .row{display:flex;justify-content:space-between;color:var(--mute)}
  .mtile .compare .delta.up{color:var(--good);font-weight:700}
  .mtile .compare .delta.down{color:var(--bad);font-weight:700}
  .mtile .compare .delta.flat{color:var(--mute);font-weight:600}

  /* Modal channels section */
  .modal-channels-section{padding:24px;border-bottom:1px solid var(--line)}
  .modal-channels-section h3{margin:0 0 12px;font-size:14px;font-weight:700;color:var(--text)}
  .ch-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:8px}
  .ch-card{background:var(--ink);border:1px solid var(--line);border-radius:8px;padding:11px 14px;display:flex;align-items:center;gap:10px}
  .ch-card.has{border-color:var(--good)}
  .ch-card .ch-icon{width:28px;height:28px;border-radius:6px;background:var(--ink-4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text-dim);flex-shrink:0}
  .ch-card.has .ch-icon{background:var(--good);color:#0A1F0F}
  .ch-card .ch-meta{display:flex;flex-direction:column;gap:1px;min-width:0;flex:1}
  .ch-card .ch-name{font-size:12px;font-weight:600;color:var(--text)}
  .ch-card .ch-status{font-size:10.5px;color:var(--mute)}
  .ch-card.has .ch-status{color:var(--good)}
  .ch-card .ch-go{font-size:11px;color:var(--text-dim)}
  .ch-card.has .ch-go{color:var(--text)}
  .ch-card.has .ch-go:hover{color:var(--pink)}

  /* Modal source files */
  .modal-files{padding:24px}
  .modal-files h3{margin:0 0 12px;font-size:14px;font-weight:700;color:var(--text)}
  .files-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
  .file-card{background:var(--ink);border:1px solid var(--line);border-radius:8px;padding:13px}
  .file-card .l{font-size:10px;color:var(--mute);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;font-weight:700}
  .file-card .v{font-size:12px;color:var(--text-dim);word-break:break-all;line-height:1.4}
  .file-card.missing .v{color:var(--mute);font-style:italic}
  .file-card.has{border-color:var(--line-2)}
  .file-card.has .v{color:var(--text);font-weight:500}
  .file-card .v a{border-bottom:1px dotted var(--line-2)}
  .file-card .v a:hover{color:var(--pink);border-color:var(--pink)}

  /* Empty / Footer */
  .empty{grid-column:1/-1;padding:60px 30px;text-align:center;color:var(--mute);border:1.5px dashed var(--line);border-radius:12px}
  .empty h2{font-family:Fraunces,serif;font-weight:400;color:var(--text);margin-bottom:6px}
  footer{padding:18px 28px;border-top:1px solid var(--line);color:var(--mute);font-size:11px;background:var(--ink);text-align:center}
  footer a{color:var(--text-dim);border-bottom:1px dotted var(--line)}

  @media (max-width:900px){
    main{grid-template-columns:1fr}
    aside{position:static;height:auto;border-right:0;border-bottom:1px solid var(--line)}
    .modal-hero{grid-template-columns:1fr}
    .modal-poster{max-width:240px;margin:0 auto}
  }
</style>
</head>
<body>

<header>
  <div class="hdr-inner">
    <div class="hdr-top">
      <div class="brand">
        <div class="brand-mark">WF</div>
        <div class="brand-text">
          <div class="t1">WorldFirst Asset Library</div>
          <div class="t2">upper-funnel video → paid · content ops</div>
        </div>
      </div>

function curve(seedHigh, seedER){
  // Generate a 14-day curve: ramp days 1-3, peak day 3, exponential decay after
  const out = [];
  const startDate = new Date(2026, 3, 5); // Apr 5
  for (let d = 0; d < 14; d++) {
    const dt = new Date(startDate); dt.setDate(dt.getDate() + d);
    const label = (dt.getMonth()+1) + "/" + dt.getDate();
    let mult;
    if (d === 0) mult = 0.18;
    else if (d === 1) mult = 0.55;
    else if (d === 2) mult = 0.95;
    else if (d === 3) mult = 1.00;     // peak
    else if (d === 4) mult = 0.78;
    else if (d === 5) mult = 0.55;
    else if (d === 6) mult = 0.38;
    else mult = 0.38 * Math.exp(-(d-6) * 0.32);
    const er = +(seedER * (0.55 + mult * 0.55)).toFixed(1);
    out.push({day: label, views: Math.round(seedHigh * mult), er, ctr: +(er * 0.32).toFixed(1)});
  }
  return out;
}

/* === HELPERS === */
function assetMatchesRegion(a, r){
  if (r === "All") return true;
  if (r === "Longtail") {
    const kids = ["Longtail-PK","Longtail-BD","Longtail-NG","Longtail-Ghana","Longtail-Morocco"];
    return a.region.some(x => kids.includes(x)) || a.regionFit.some(x => kids.includes(x) || x === "Longtail");
  }
  return a.region.includes(r) || a.regionFit.includes(r);
}
function countAssetsForRegion(r){ return ASSETS.filter(a => assetMatchesRegion(a,r)).length }
function countGapsForRegion(r){ return ASSETS.filter(a => assetMatchesRegion(a,r) && a.lifecycle === "gap").length }
function lifecycleOrder(lc){return {live:0,"winding-down":1,ready:2,edit:3,scripted:4,gap:5,archived:6}[lc] ?? 9}
function fmtNum(n){if (n>=1e6) return (n/1e6).toFixed(1)+"M"; if (n>=1e3) return (n/1e3).toFixed(1)+"K"; return String(n)}
function delta(actual, ref){
  if (!ref || !actual) return {pct:null, dir:"flat"};
  const d = ((actual - ref) / ref) * 100;
  return {pct: Math.round(d), dir: d > 5 ? "up" : d < -5 ? "down" : "flat"};
}
function lifecycleStatus(a){
  if (a.lifecycle !== "live" || !a.perf) return null;
  const er = a.perf.erPct;
  if (er >= 6) return {stage:"Peak engagement", icon:"📈", action:"Keep boosting", cls:"active",
                       detail:"Engagement still well above 2% boost-stop threshold. Continue paid amplification."};
  if (er >= 3) return {stage:"Cooling", icon:"🌙", action:"Still boost", cls:"cooling",
                       detail:"Past peak but engagement above threshold. Monitor daily — taper boosting if drops below 2%."};
  if (er >= 2) return {stage:"Long tail", icon:"🍂", action:"Reduce spend", cls:"cooling",
                       detail:"Approaching boost-stop threshold (2% ER). Reduce paid spend, let organic carry."};
  return {stage:"Below threshold", icon:"⚠", action:"Stop boost", cls:"below",
          detail:"ER below 2% — content has saturated. Pull paid budget. Consider archive or redistribution to new region."};
}

function renderCampaignBar(){
  const bar = document.getElementById("campaignBar");
  const rel = new Set();
  ASSETS.forEach(a => { if (assetMatchesRegion(a, state.region)) rel.add(a.campaign); });

  bar.innerHTML = inOrder.map(c => {

    const cnt = c === "All"

  const counts = (key, val) => ASSETS.filter(a =>

  function facet(key, label, vals){

function matches(a){
  if (!assetMatchesRegion(a, state.region)) return false;
  if (state.campaign !== "All" && a.campaign !== state.campaign) return false;
  if (state.q) {
    const q = state.q.toLowerCase();
    const hay = [a.title, a.notes, a.creator, a.id, a.campaign, a.pillar].join(" ").toLowerCase();
    if (!hay.includes(q)) return false;
  }
  for (const k of Object.keys(state.filters)) {
    const set = state.filters[k];
    if (set.size === 0) continue;
    if (!set.has(a[k])) return false;
  }
  return true;
}

function openModal(id){
  const a = ASSETS.find(x => x.id === id);
  if (!a) return;
  const isLive = a.lifecycle === "live";
  const isGap = a.lifecycle === "gap";
  const lcStatus = lifecycleStatus(a);

  // Determine primary region for benchmarks
  const primaryRegion = a.region[0] || "Global";
  const refRegion = BENCHMARKS.region[primaryRegion] || BENCHMARKS.region["Global"];
  const refCampaign = (BENCHMARKS.campaign[a.campaign] && (BENCHMARKS.campaign[a.campaign][primaryRegion] || BENCHMARKS.campaign[a.campaign]["Global"])) || null;

  const chLabels = {yt:"YouTube",tiktok:"TikTok",ig:"Instagram",fb:"Facebook",linkedin:"LinkedIn"};
  const chShort  = {yt:"YT",tiktok:"TT",ig:"IG",fb:"FB",linkedin:"LI"};
  const channels = a.publishedURLs || {};

  // Metric tile renderer
  function metricTile(label, value, sub, actualForCompare, refKey){
    if (!isLive || !a.perf) {
      return `<div class="mtile">
        <div class="l">${label}</div>
        <div class="vrow"><div class="v" style="color:var(--mute)">—</div><div class="vsub">not published</div></div>
      </div>`;
    }
    const dRegion = delta(actualForCompare, refRegion?.[refKey]);
    const dCampaign = refCampaign ? delta(actualForCompare, refCampaign[refKey]) : null;
    const arrow = (dir) => dir === "up" ? "▲" : dir === "down" ? "▼" : "—";
    const sign  = (pct) => pct === null ? "—" : (pct >= 0 ? "+" : "") + pct + "%";
    return `<div class="mtile">
      <div class="l">${label}</div>
      <div class="vrow"><div class="v">${value}</div><div class="vsub">${sub || ""}</div></div>
      <div class="compare">
        <div class="row"><span>vs ${primaryRegion} avg</span>
          <span class="delta ${dRegion.dir}">${arrow(dRegion.dir)} ${sign(dRegion.pct)}</span></div>
        ${dCampaign ? `<div class="row"><span>vs campaign in region</span>
          <span class="delta ${dCampaign.dir}">${arrow(dCampaign.dir)} ${sign(dCampaign.pct)}</span></div>` : ""}
      </div>
    </div>`;
  }

  // Channel cards
  const channelsHtml = `<div class="ch-grid">
    ${Object.entries(chLabels).map(([k, name]) => {
      const url = channels[k];
      return `<div class="ch-card ${url ? "has" : ""}">
        <div class="ch-icon">${chShort[k]}</div>
        <div class="ch-meta">
          <div class="ch-name">${name}</div>
          <div class="ch-status">${url ? "Published" : (isLive ? "Skipped this channel" : "Not yet live")}</div>
        </div>
        ${url ? `<a class="ch-go" href="${url}" target="_blank">View →</a>` : ""}
      </div>`;
    }).join("")}
  </div>`;

  // Source files
  const fileCard = (label, link) => `<div class="file-card ${link ? "has" : "missing"}">
    <div class="l">${label}</div>
    <div class="v">${link ? `<a class="source-link" href="#" title="${link}">${link}</a>` : "Not yet available"}</div>
  </div>`;

  const html = `
    <button class="modal-close" id="modalCloseBtn">×</button>
    <div class="modal-hero">
      <div class="modal-poster" style="background:${a.thumbBg}">
        <div class="thumb-bg-pattern"></div>
        <div class="thumb-badges">
          <span class="badge ${a.lifecycle}">${a.lifecycle}</span>
          ${a.duration ? `<span class="badge-dur">${a.duration}s</span>` : ""}
        </div>
        <div class="thumb-title-block">
          <div class="thumb-title">${a.title}</div>
        </div>
        <div class="thumb-corner-mark">
          <div class="wf-mini">WF</div>
          <div class="ch">${a.campaign.split(' ').slice(0,3).join(' ').toUpperCase()}</div>
        </div>
        <div class="thumb-creator-line">
          <span>${a.creator}</span>${a.creatorHandle ? `<span class="dot"></span><span>${a.creatorHandle}</span>` : ""}
        </div>
        ${isLive && a.perf ? `<div class="thumb-views-live">${fmtNum(a.perf.views)} views</div>` : ""}
      </div>
      <div class="modal-info">
        <span class="id-pill">${a.id}</span>
        <div class="modal-camp">${a.campaign}</div>
        <h2>${a.title}</h2>
        <div class="modal-meta-grid">
          <div class="mm"><div class="l">Creator</div><div class="v">${a.creator}<br><span style="font-weight:400;color:var(--mute);font-size:11px">${a.creatorHandle || ""}</span></div></div>

        </div>
        ${lcStatus ? `<div class="lifecycle-status ${lcStatus.cls}">
          <div class="lc-head">

        ${metricTile("Followers Gained", fmtNum(a.perf.follows), `${(a.perf.follows / a.perf.views * 1000).toFixed(1)}/1k views`, a.perf.follows / a.perf.views * 1000, "followsPer1k")}
      </div>

      <h3>Source files</h3>
      <div class="files-grid">
        ${fileCard("Finished video", a.finishedFile)}
        ${fileCard("Original / raw footage", a.originalFile)}
        ${fileCard("Script", a.scriptFile)}
      </div>
    </div>
  `;

  document.getElementById("modalContent").innerHTML = html;
  document.getElementById("modalOverlay").classList.add("open");
  document.body.style.overflow = "hidden";

  // Close handler
  document.getElementById("modalCloseBtn").onclick = closeModal;

  // Render chart if live
  if (isLive && a.perf && a.perf.dailyMetrics) {
    if (activeChart) activeChart.destroy();
    const ctx = document.getElementById("perfChart").getContext("2d");
    const labels = a.perf.dailyMetrics.map(d => d.day);
    const erData = a.perf.dailyMetrics.map(d => d.er);
    const refER = refRegion?.erPct || 4.5;
    const campER = refCampaign?.erPct || refER;
    activeChart = new Chart(ctx, {
      type: "line",
      data: {
        labels,

          {label: "This content · ER %", data: erData, borderColor: "#E6185F", backgroundColor: "rgba(230,24,95,0.12)", fill: true, tension: 0.35, borderWidth: 3, pointRadius: 4, pointBackgroundColor: "#E6185F"},
          {label: `${primaryRegion} regional avg`, data: labels.map(()=>refER), borderColor: "#7A8099", borderDash: [5,5], borderWidth: 1.5, pointRadius: 0, fill: false},
          {label: `Campaign avg in ${primaryRegion}`, data: labels.map(()=>campER), borderColor: "#A855F7", borderDash: [3,3], borderWidth: 1.5, pointRadius: 0, fill: false},
          {label: "Boost-stop threshold (2%)", data: labels.map(()=>2.0), borderColor: "#EF4444", borderDash: [2,4], borderWidth: 1, pointRadius: 0, fill: false}
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: {labels:{color:"#AEB4C7", font:{size:11}}},
          tooltip: {backgroundColor:"#0B0D12", titleColor:"#E7EAF2", bodyColor:"#AEB4C7", borderColor:"#2A2F3F", borderWidth:1, padding:10}
        },
        scales: {
          x: {grid:{color:"#1A1E28"}, ticks:{color:"#7A8099", font:{size:10}}},
          y: {grid:{color:"#1A1E28"}, ticks:{color:"#7A8099", font:{size:10}, callback:v=>v+"%"}, title:{display:true,text:"Engagement Rate (%)",color:"#7A8099",font:{size:11}}}
        }
      }
    });
  }
}

function closeModal(){
  document.getElementById("modalOverlay").classList.remove("open");
  document.body.style.overflow = "";
  if (activeChart) { activeChart.destroy(); activeChart = null; }
}

function render(){
  renderRegionBar();
  renderCampaignBar();
  renderFilters();
  renderBreadcrumb();
  renderCards();
}

/* === EVENTS — bound once === */
function init(){
  renderHdrStats();
  render();

  document.getElementById("regionBar").addEventListener("click", (e) => {
    const btn = e.target.closest("[data-region]");
    if (!btn) return;
    state.region = btn.dataset.region;
    state.campaign = "All";
    render();
  });
  document.getElementById("campaignBar").addEventListener("click", (e) => {
    const btn = e.target.closest("[data-campaign]");
    if (!btn) return;
    state.campaign = btn.dataset.campaign;
    render();
  });
  document.getElementById("filters").addEventListener("click", (e) => {
    const chip = e.target.closest("[data-facet]");
    if (!chip) return;
    const k = chip.dataset.facet;
    const v = chip.dataset.val;
    if (state.filters[k].has(v)) state.filters[k].delete(v);
    else state.filters[k].add(v);
    render();
  });
  document.getElementById("searchInput").addEventListener("input", (e) => {
    state.q = e.target.value;
    renderCards();
  });
  document.getElementById("sortSelect").addEventListener("change", (e) => {
    state.sort = e.target.value;
    renderCards();
  });
  document.getElementById("clearAll").addEventListener("click", () => {
    state.region = "All"; state.campaign = "All"; state.q = "";
    Object.values(state.filters).forEach(s => s.clear());
    document.getElementById("searchInput").value = "";
    render();
  });
  // Card click → modal
  document.getElementById("cardsGrid").addEventListener("click", (e) => {
    const card = e.target.closest(".card");
    if (!card) return;
    openModal(card.dataset.aid);
  });
  // Click outside modal to close
  document.getElementById("modalOverlay").addEventListener("click", (e) => {
    if (e.target.id === "modalOverlay") closeModal();
  });
  // Escape to close
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeModal();
  });
}

init();
</script>

</body>
</html>
