<title>WorldFirst · Asset Library</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --pink:#E6185F;
    --ink:#0B0D12;
    --ink-2:#12151C;
    --ink-3:#1A1E28;
    --ink-4:#242936;
    --line:#2A2F3F;
    --line-2:#3A4053;
    --mute:#7A8099;
    --text:#E7EAF2;
    --text-dim:#AEB4C7;
    --good:#22C55E;
    --warn:#F59E0B;
    --bad:#EF4444;
    --blue:#3B82F6;
    --purple:#A855F7;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--ink);color:var(--text);font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{min-height:100vh;display:flex;flex-direction:column}
  a{color:inherit;text-decoration:none}
  button,select,input{font-family:inherit}
  button{cursor:pointer}

  /* ================ HEADER ================ */
  header{
    border-bottom:1px solid var(--line);
    background:var(--ink);
    position:sticky;top:0;z-index:100;
  }
  .hdr-inner{padding:18px 28px;max-width:1600px;margin:0 auto}
  .hdr-top{display:flex;align-items:center;justify-content:space-between;gap:24px;margin-bottom:14px}
  .brand{display:flex;align-items:center;gap:12px}
  .brand-mark{
    width:32px;height:32px;border-radius:7px;
    background:var(--pink);display:flex;align-items:center;justify-content:center;
    font-weight:800;color:white;font-size:13px;letter-spacing:-0.5px;
  }
  .brand-text .t1{font-weight:700;font-size:14px}
  .brand-text .t2{font-size:10.5px;color:var(--mute);letter-spacing:0.6px;text-transform:uppercase;margin-top:1px}
  .hdr-meta{display:flex;gap:16px;align-items:center;color:var(--mute);font-size:11.5px}
  .hdr-meta .pill{background:var(--ink-2);padding:4px 9px;border-radius:20px;font-family:JetBrains Mono,monospace;font-size:10.5px}

  /* Region bar */
  .region-bar{display:flex;gap:6px;overflow-x:auto;padding:4px 0 8px;scrollbar-width:thin}
  .region-bar::-webkit-scrollbar{height:4px}
  .region-bar::-webkit-scrollbar-thumb{background:var(--line)}
  .region-pill{
    padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;
    background:var(--ink-2);border:1px solid var(--line);color:var(--text-dim);
    white-space:nowrap;transition:all .12s;display:flex;align-items:center;gap:8px;
    flex-shrink:0;
  }
  .region-pill:hover{color:var(--text);border-color:var(--line-2)}
  .region-pill.active{background:var(--pink);border-color:var(--pink);color:white}
  .region-pill .rc{
    font-family:JetBrains Mono,monospace;font-size:10.5px;
    background:rgba(255,255,255,0.12);padding:1px 6px;border-radius:4px;
    color:inherit;
  }
  .region-pill.active .rc{background:rgba(0,0,0,0.2)}
  .region-pill .gap-dot{width:6px;height:6px;background:var(--bad);border-radius:50%}

  /* Campaign bar */
  .campaign-bar{
    display:flex;gap:6px;overflow-x:auto;padding:10px 0 0;
    border-top:1px solid var(--line);margin-top:2px;
  }
  .campaign-bar::-webkit-scrollbar{height:3px}
  .campaign-pill{
    padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;
    background:transparent;border:1px solid var(--line);color:var(--text-dim);
    white-space:nowrap;flex-shrink:0;
  }
  .campaign-pill:hover{color:var(--text)}
  .campaign-pill.active{background:var(--ink-3);border-color:var(--pink);color:var(--pink)}
  .campaign-pill .cc{font-family:JetBrains Mono,monospace;font-size:10px;color:var(--mute);margin-left:4px}

  /* ================ LAYOUT ================ */
  main{display:grid;grid-template-columns:240px 1fr;gap:0;max-width:1600px;margin:0 auto;width:100%;flex:1}

  /* Sidebar */
  aside{
    border-right:1px solid var(--line);
    padding:20px 18px;
    position:sticky;top:212px;
    height:calc(100vh - 212px);
    overflow-y:auto;
  }
  .facet{margin-bottom:20px}
  .facet h3{
    font-size:10.5px;text-transform:uppercase;letter-spacing:0.8px;color:var(--mute);
    margin:0 0 8px;font-weight:700;
  }
  .facet .chips{display:flex;flex-direction:column;gap:3px}
  .chip{
    background:transparent;border:1px solid transparent;color:var(--text-dim);
    padding:6px 9px;border-radius:6px;font-size:12.5px;text-align:left;
    display:flex;justify-content:space-between;align-items:center;
  }
  .chip:hover{background:var(--ink-2);color:var(--text)}
  .chip.active{background:var(--ink-3);border-color:var(--line-2);color:var(--text);font-weight:600}
  .chip .c{font-family:JetBrains Mono,monospace;font-size:10px;color:var(--mute)}
  .chip.active .c{color:var(--pink)}

  /* Lifecycle dots */
  .lc-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}
  .lc-gap{background:var(--bad)}
  .lc-edit{background:var(--warn)}
  .lc-ready{background:var(--blue)}
  .lc-live{background:var(--good)}
  .lc-winding{background:#F97316}
  .lc-archived{background:var(--mute)}

  /* ================ GRID ================ */
  .grid-wrap{padding:22px 28px;overflow-y:auto}
  .breadcrumb{
    display:flex;align-items:center;gap:10px;margin-bottom:14px;
    font-size:13px;color:var(--mute);
  }
  .breadcrumb strong{color:var(--text);font-weight:600}
  .breadcrumb .sep{color:var(--line-2)}
  .bc-count{margin-left:auto;color:var(--mute);font-size:12px;font-family:JetBrains Mono,monospace}

  .toolbar{
    display:flex;gap:8px;margin-bottom:18px;align-items:center;
  }
  .search{
    flex:1;background:var(--ink-2);border:1px solid var(--line);border-radius:8px;
    padding:0 12px;display:flex;align-items:center;gap:8px;
  }
  .search svg{color:var(--mute);flex-shrink:0}
  .search input{
    flex:1;background:transparent;border:0;outline:0;color:var(--text);
    font-size:13.5px;padding:9px 0;
  }
  .search input::placeholder{color:var(--mute)}
  .sort{
    background:var(--ink-2);border:1px solid var(--line);border-radius:8px;
    padding:0 10px 0 14px;color:var(--text);font-size:13px;height:38px;outline:0;
  }
  .sort:focus{border-color:var(--line-2)}
  .sort option{background:var(--ink-2)}
  .clear{background:transparent;border:1px solid var(--line);color:var(--mute);padding:0 12px;border-radius:8px;height:38px;font-size:12px}
  .clear:hover{border-color:var(--line-2);color:var(--text)}

  .cards{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:16px;
  }

  /* ================ CARD ================ */
  .card{
    background:var(--ink-2);border:1px solid var(--line);border-radius:10px;
    overflow:hidden;display:flex;flex-direction:column;
    transition:border-color .12s;
  }
  .card:hover{border-color:var(--line-2)}
  .card.gap{border:1.5px dashed rgba(239,68,68,0.4);background:rgba(239,68,68,0.03)}

  /* Vertical 9:16 thumbnail */
  .thumb{
    aspect-ratio:9/16;background:var(--ink-3);position:relative;
    overflow:hidden;display:flex;align-items:center;justify-content:center;
  }
  .thumb-poster{
    position:absolute;inset:0;
    display:flex;flex-direction:column;justify-content:flex-end;
    padding:14px;
    background:linear-gradient(180deg,rgba(11,13,18,0) 40%,rgba(11,13,18,0.85) 85%,rgba(11,13,18,0.95) 100%);
  }
  .thumb-bg{
    position:absolute;inset:0;z-index:-1;
    display:flex;align-items:center;justify-content:center;
    font-size:80px;opacity:0.35;filter:grayscale(0.3);
  }
  .thumb-title{
    font-weight:700;font-size:14px;line-height:1.25;color:white;
    letter-spacing:-0.3px;text-shadow:0 1px 2px rgba(0,0,0,0.5);
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;
    overflow:hidden;
  }
  .thumb-sub{
    font-size:11px;color:rgba(255,255,255,0.75);margin-top:6px;
    font-weight:500;
  }
  .thumb.real-bg{background-size:cover;background-position:center}

  .thumb-badges{
    position:absolute;top:10px;left:10px;right:10px;
    display:flex;gap:6px;flex-wrap:wrap;justify-content:space-between;
  }
  .badge{
    background:rgba(0,0,0,0.65);backdrop-filter:blur(8px);
    color:white;padding:3px 8px;border-radius:5px;
    font-size:10px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;
    display:flex;align-items:center;gap:4px;
  }
  .badge.live{background:var(--good);color:#0A1F0F}
  .badge.edit{background:var(--warn);color:#1F1407}
  .badge.ready{background:var(--blue);color:#0A1F2E}
  .badge.gap{background:var(--bad);color:#1F0707}
  .badge.winding{background:#F97316;color:#1F0E07}
  .badge.archived{background:var(--mute);color:white}
  .badge-dur{
    position:absolute;bottom:10px;right:10px;
    background:rgba(0,0,0,0.72);color:white;padding:3px 7px;border-radius:4px;
    font-size:10.5px;font-family:JetBrains Mono,monospace;font-weight:600;
  }

  /* Card body */
  .body{padding:12px 14px 14px;display:flex;flex-direction:column;gap:8px;flex:1}
  .title{
    font-weight:600;font-size:13px;line-height:1.3;color:var(--text);
    letter-spacing:-0.1px;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  }
  .meta-row{font-size:11px;color:var(--mute);display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .meta-row .tag{
    padding:2px 6px;border-radius:3px;font-weight:500;font-size:10px;
    text-transform:uppercase;letter-spacing:0.4px;
  }
  .tag.kol{background:rgba(168,85,247,0.15);color:#C084FC}
  .tag.team{background:rgba(59,130,246,0.15);color:#60A5FA}
  .tag.freelancer{background:rgba(245,158,11,0.15);color:#FCD34D}
  .tag.partner{background:rgba(34,197,94,0.15);color:#4ADE80}
  .tag.buyer{background:rgba(236,72,153,0.15);color:#F472B6}
  .tag.brand{background:rgba(156,163,175,0.15);color:#D1D5DB}

  .creator{font-weight:500;color:var(--text-dim);font-size:11.5px}
  .campaign-ref{
    font-size:10.5px;color:var(--pink);font-weight:600;
    letter-spacing:0.3px;text-transform:uppercase;margin-top:2px;
  }

  /* Published channels row */
  .channels{
    display:flex;gap:4px;margin-top:4px;padding-top:8px;
    border-top:1px solid var(--line);
  }
  .ch-link{
    width:24px;height:24px;border-radius:5px;background:var(--ink-3);
    display:flex;align-items:center;justify-content:center;
    font-size:10px;font-weight:700;color:var(--text-dim);
    transition:all .12s;
  }
  .ch-link:hover{background:var(--line-2);color:var(--text)}
  .ch-link.has{background:var(--ink-4);color:var(--text)}
  .ch-link.has:hover{background:var(--pink);color:white}

  /* Performance */
  .perf{
    display:grid;grid-template-columns:repeat(3,1fr);gap:2px;
    background:var(--ink);border-radius:6px;overflow:hidden;margin-top:2px;
  }
  .perf-cell{
    padding:7px 8px;background:var(--ink-3);display:flex;flex-direction:column;gap:1px;
  }
  .perf-val{font-weight:700;font-size:12px;color:var(--text);font-variant-numeric:tabular-nums}
  .perf-lbl{font-size:9px;color:var(--mute);text-transform:uppercase;letter-spacing:0.4px}
  .perf-placeholder{
    padding:8px 10px;background:var(--ink-3);border-radius:6px;
    font-size:10.5px;color:var(--mute);font-style:italic;
    display:flex;align-items:center;gap:6px;
  }
  .perf-placeholder::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--mute);opacity:0.5}

  /* Lifecycle bar */
  .lifecycle{
    display:flex;gap:2px;margin-top:4px;
  }
  .lc-seg{
    flex:1;height:3px;background:var(--ink-4);border-radius:1px;
  }
  .lc-seg.on.gap{background:var(--bad)}
  .lc-seg.on.edit{background:var(--warn)}
  .lc-seg.on.ready{background:var(--blue)}
  .lc-seg.on.live{background:var(--good)}
  .lc-seg.on.winding{background:#F97316}

  /* Source links row */
  .source-row{
    display:flex;gap:6px;font-size:10.5px;color:var(--mute);
    margin-top:auto;padding-top:8px;border-top:1px solid var(--line);
  }
  .source-link{
    color:var(--text-dim);text-decoration:none;border-bottom:1px dotted var(--line-2);
    padding-bottom:1px;
  }
  .source-link:hover{color:var(--pink);border-color:var(--pink)}
  .source-missing{color:var(--mute);opacity:0.55}

  /* Empty state */
  .empty{
    grid-column:1/-1;padding:60px 30px;text-align:center;color:var(--mute);
    border:1.5px dashed var(--line);border-radius:12px;
  }
  .empty h2{font-family:Fraunces,serif;font-weight:400;color:var(--text);margin-bottom:6px}
  .empty p{max-width:460px;margin:6px auto 0;font-size:13px;line-height:1.6}

  /* Footer */
  footer{
    padding:18px 28px;border-top:1px solid var(--line);color:var(--mute);
    font-size:11px;background:var(--ink);text-align:center;
  }
  footer a{color:var(--text-dim);border-bottom:1px dotted var(--line)}

  @media (max-width:900px){
    main{grid-template-columns:1fr}
    aside{position:static;height:auto;border-right:0;border-bottom:1px solid var(--line)}
  }
</style>
</head>

/* =================== STATE =================== */
const state = {
  region:"All",
  campaign:"All",
  q:"",
  filters:{talentCategory:new Set(), lifecycle:new Set(), format:new Set(), language:new Set()},
  sort:"lifecycle"
};

/* =================== HELPERS =================== */
function assetMatchesRegion(a, r){
  if (r === "All") return true;
  if (r === "Longtail") {
    const kids = ["Longtail-PK","Longtail-BD","Longtail-NG","Longtail-Ghana","Longtail-Morocco"];
    return a.region.some(x => kids.includes(x)) || a.regionFit.some(x => kids.includes(x) || x === "Longtail");
  }
  return a.region.includes(r) || a.regionFit.includes(r);
}
function countAssetsForRegion(r){ return ASSETS.filter(a => assetMatchesRegion(a, r)).length }
function countGapsForRegion(r){ return ASSETS.filter(a => assetMatchesRegion(a, r) && a.lifecycle === "gap").length }

function lifecycleOrder(lc){
  const o = {live:0, "winding-down":1, ready:2, edit:3, scripted:4, gap:5, archived:6};
  return o[lc] ?? 9;
}

function matches(a){
  if (!assetMatchesRegion(a, state.region)) return false;
  if (state.campaign !== "All" && a.campaign !== state.campaign) return false;
  if (state.q) {
    const q = state.q.toLowerCase();
    const hay = [a.title, a.notes, a.creator, a.id, a.campaign, a.pillar].join(" ").toLowerCase();
    if (!hay.includes(q)) return false;
  }
  for (const k of Object.keys(state.filters)) {
    const set = state.filters[k];
    if (set.size === 0) continue;
    const v = a[k];
    if (!set.has(v)) return false;
  }
  return true;
}

function fmtNum(n){
  if (n >= 1e6) return (n/1e6).toFixed(1)+"M";
  if (n >= 1e3) return (n/1e3).toFixed(1)+"K";
  return String(n);
}

/* =================== RENDER =================== */
function renderHdrStats(){
  const total = ASSETS.length;
  const gaps = ASSETS.filter(a => a.lifecycle === "gap").length;
  const live = ASSETS.filter(a => a.lifecycle === "live").length;
  document.getElementById("hdrCount").textContent = total + " assets";
  document.getElementById("hdrGap").textContent = gaps + " gaps";
  document.getElementById("hdrLive").textContent = live + " live";
}

function renderRegionBar(){
  const bar = document.getElementById("regionBar");
  bar.innerHTML = REGIONS.map(r => {
    const active = state.region === r.key;
    const count = countAssetsForRegion(r.key);
    const gaps = countGapsForRegion(r.key);
    return `<button class="region-pill ${active ? "active" : ""}" data-region="${r.key}">
      <span>${r.label}</span>
      <span class="rc">${count}</span>
      ${gaps > 0 ? `<span class="gap-dot" title="${gaps} gaps"></span>` : ""}
    </button>`;
  }).join("");
}

function renderCampaignBar(){
  const bar = document.getElementById("campaignBar");
  // Only show campaigns that have assets in the current region
  const relevantCampaigns = new Set();
  ASSETS.forEach(a => { if (assetMatchesRegion(a, state.region)) relevantCampaigns.add(a.campaign); });
  const inOrder = ["All", ...CAMPAIGNS.filter(c => relevantCampaigns.has(c))];

  bar.innerHTML = inOrder.map(c => {
    const active = state.campaign === c;
    const cnt = c === "All"
      ? ASSETS.filter(a => assetMatchesRegion(a, state.region)).length
      : ASSETS.filter(a => assetMatchesRegion(a, state.region) && a.campaign === c).length;
    return `<button class="campaign-pill ${active ? "active" : ""}" data-campaign="${c}">
      ${c === "All" ? "All campaigns" : c}<span class="cc">${cnt}</span>
    </button>`;
  }).join("");
}

function renderFilters(){
  const aside = document.getElementById("filters");
  const talentCats = [...new Set(ASSETS.map(a => a.talentCategory))];
  const lifecycles = ["gap","edit","ready","live","winding-down","archived"];
  const formats = [...new Set(ASSETS.map(a => a.format))];
  const languages = [...new Set(ASSETS.map(a => a.language))];

  const counts = (key, val) => ASSETS.filter(a => assetMatchesRegion(a, state.region) && (state.campaign === "All" || a.campaign === state.campaign) && a[key] === val).length;

  function facetHTML(key, label, values){
    return `<div class="facet">
      <h3>${label}</h3>
      <div class="chips">
        ${values.map(v => {
          const active = state.filters[key].has(v);
          const c = counts(key, v);
          const lcMark = key === "lifecycle" ? `<span class="lc-dot lc-${v === "winding-down" ? "winding" : v}"></span>` : "";
          return `<button class="chip ${active ? "active" : ""}" data-facet="${key}" data-val="${v}">
            <span>${lcMark}${v}</span>
            <span class="c">${c}</span>
          </button>`;
        }).join("")}
      </div>
    </div>`;
  }

  aside.innerHTML =
    facetHTML("lifecycle", "Lifecycle stage", lifecycles) +
    facetHTML("talentCategory", "Talent", talentCats) +
    facetHTML("format", "Format", formats) +
    facetHTML("language", "Language", languages);
}

function renderBreadcrumb(){
  const bc = document.getElementById("breadcrumb");
  const r = REGIONS.find(x => x.key === state.region);
  const regionLabel = r ? r.label : state.region;
  bc.innerHTML = `
    <strong>${regionLabel}</strong>
    ${state.campaign !== "All" ? `<span class="sep">/</span> <strong>${state.campaign}</strong>` : ""}
    <span class="bc-count" id="bcCount"></span>
  `;
}

function renderCards(){
  const grid = document.getElementById("cardsGrid");
  let filtered = ASSETS.filter(matches);

  // Sort
  if (state.sort === "lifecycle") filtered.sort((a,b) => lifecycleOrder(a.lifecycle) - lifecycleOrder(b.lifecycle));
  else if (state.sort === "gap-first") filtered.sort((a,b) => (a.lifecycle === "gap" ? 0 : 1) - (b.lifecycle === "gap" ? 0 : 1));
  else if (state.sort === "performance") filtered.sort((a,b) => (b.perf?.views || 0) - (a.perf?.views || 0));
  else if (state.sort === "newest") filtered.reverse();

  document.getElementById("bcCount").textContent = `${filtered.length} of ${ASSETS.length}`;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty">
      <h2>No assets in this view</h2>
      <p>Try a different region or campaign, or reset filters.</p>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(a => {
    const isGap = a.lifecycle === "gap";
    const talentClass = a.talentCategory.toLowerCase().includes("kol") ? "kol"
      : a.talentCategory.toLowerCase().includes("team") ? "team"
      : a.talentCategory.toLowerCase().includes("freelancer") ? "freelancer"
      : a.talentCategory.toLowerCase().includes("partner") ? "partner"
      : a.talentCategory.toLowerCase().includes("buyer") ? "buyer"
      : "brand";

    // Published channels
    const channels = a.publishedURLs || {};
    const chLabels = {yt:"YT",tiktok:"TT",ig:"IG",fb:"FB",linkedin:"LI",x:"X"};
    const channelsHtml = a.lifecycle === "live" ? `<div class="channels" title="Published on">
      ${Object.entries(chLabels).map(([k,l]) => {
        const url = channels[k];
        return url ? `<a class="ch-link has" href="${url}" target="_blank" title="${k} · view post">${l}</a>`
                   : `<div class="ch-link" title="Not published on ${k}">${l}</div>`;
      }).join("")}
    </div>` : "";

    // Performance
    const perfHtml = a.lifecycle === "live"
      ? (a.perf ? `<div class="perf">
          <div class="perf-cell"><span class="perf-val">${fmtNum(a.perf.views)}</span><span class="perf-lbl">Views</span></div>
          <div class="perf-cell"><span class="perf-val">${a.perf.erPct}%</span><span class="perf-lbl">ER</span></div>
          <div class="perf-cell"><span class="perf-val">${a.perf.watchTime}s</span><span class="perf-lbl">Watch</span></div>
        </div>` : `<div class="perf-placeholder">Performance pending Sprout ingestion</div>`)
      : "";

    // Lifecycle bar (visual progression)
    const stages = ["gap","edit","ready","live","winding"];
    const stageIdx = {gap:0, scripted:0, edit:1, ready:2, live:3, "winding-down":4, archived:4}[a.lifecycle] ?? 0;
    const lcBar = `<div class="lifecycle">${stages.map((s,i) => `<div class="lc-seg ${i <= stageIdx ? `on ${s}` : ""}"></div>`).join("")}</div>`;

    // Source files
    const srcRow = `<div class="source-row">
      ${a.finishedFile
        ? `<a class="source-link" href="#" title="${a.finishedFile}">Finished</a>`
        : `<span class="source-missing">Finished —</span>`}
      <span>·</span>
      ${a.originalFile
        ? `<a class="source-link" href="#" title="${a.originalFile}">Original</a>`
        : `<span class="source-missing">Original —</span>`}
    </div>`;

    return `<div class="card ${isGap ? "gap" : ""}">
      <div class="thumb" style="background:${a.thumbBg || "#1A1E28"}">
        <div class="thumb-bg">${a.thumb || "📎"}</div>
        <div class="thumb-badges">
          <span class="badge ${a.lifecycle === "winding-down" ? "winding" : a.lifecycle}">${a.lifecycle === "winding-down" ? "WINDING DOWN" : a.lifecycle}</span>
          ${a.format === "Carousel" ? `<span class="badge" style="background:rgba(0,0,0,0.65)">CAROUSEL</span>` :
            a.format === "LinkedIn article" ? `<span class="badge" style="background:rgba(0,0,0,0.65)">ARTICLE</span>` :
            a.format === "Static graphic" ? `<span class="badge" style="background:rgba(0,0,0,0.65)">STATIC</span>` : ""}
        </div>
        <div class="thumb-poster">
          <div class="thumb-title">${a.title}</div>
          <div class="thumb-sub">${a.creator}</div>
        </div>
        ${a.duration ? `<div class="badge-dur">${a.duration}s</div>` : ""}
      </div>

      <div class="body">
        <div class="campaign-ref">${a.campaign}</div>
        <div class="meta-row">
          <span class="tag ${talentClass}">${a.talentCategory}</span>
          <span>·</span>
          <span class="creator">${a.region.join(", ")}</span>
          <span>·</span>
          <span>${a.language}</span>
        </div>
        ${lcBar}
        ${channelsHtml}
        ${perfHtml}
        ${isGap ? `<div style="font-size:11px;color:var(--bad);padding:6px 8px;background:rgba(239,68,68,0.06);border-radius:5px">
          ${a.notes}
        </div>` : `<div style="font-size:11px;color:var(--text-dim);line-height:1.4">${a.notes}</div>`}
        ${srcRow}
      </div>
    </div>`;
  }).join("");
}

function render(){
  renderRegionBar();
  renderCampaignBar();
  renderFilters();
  renderBreadcrumb();
  renderCards();
}

/* =================== EVENTS =================== */
// Bound ONCE to document — works even after DOM rebuild
function init(){
  renderHdrStats();
  render();

  // Region bar
  document.getElementById("regionBar").addEventListener("click", (e) => {
    const btn = e.target.closest("[data-region]");
    if (!btn) return;
    state.region = btn.dataset.region;
    state.campaign = "All";
    render();
  });

  // Campaign bar
  document.getElementById("campaignBar").addEventListener("click", (e) => {
    const btn = e.target.closest("[data-campaign]");
    if (!btn) return;
    state.campaign = btn.dataset.campaign;
    render();
  });

  // Facet chips in sidebar
  document.getElementById("filters").addEventListener("click", (e) => {
    const chip = e.target.closest("[data-facet]");
    if (!chip) return;
    const k = chip.dataset.facet;
    const v = chip.dataset.val;
    if (state.filters[k].has(v)) state.filters[k].delete(v);
    else state.filters[k].add(v);
    render();
  });

  // Search
  document.getElementById("searchInput").addEventListener("input", (e) => {
    state.q = e.target.value;
    renderCards();
  });

  // Sort
  document.getElementById("sortSelect").addEventListener("change", (e) => {
    state.sort = e.target.value;
    renderCards();
  });

  // Clear
  document.getElementById("clearAll").addEventListener("click", () => {
    state.region = "All";
    state.campaign = "All";
    state.q = "";
    Object.values(state.filters).forEach(s => s.clear());
    document.getElementById("searchInput").value = "";
    render();
  });
}

init();
</script>

</body>
</html>
